services:
  rita2api:
    build:
      context: .
      dockerfile: Dockerfile
    image: rita2api:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 10089
    ports:
      - "${HOST_PORT:-10089}:10089"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:10089/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
